<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      font-size: 13px;
      color: #1c1c1e;
      background: #fff;
    }

    .brand {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px;
      background: #111; color: #fff;
    }
    .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: #f59e0b; flex: 0 0 auto; }
    .brand-name { font-size: 11px; font-weight: 700; letter-spacing: 0.22em; }

    .section { padding: 14px 16px; border-bottom: 1px solid #eee; }

    .lbl {
      display: block; font-size: 10px; font-weight: 700;
      letter-spacing: 0.16em; color: #999;
      text-transform: uppercase; margin-bottom: 7px;
    }

    input[type=text] {
      width: 100%; padding: 9px 11px;
      border: 1.5px solid #ddd; border-radius: 7px;
      font-size: 13px; font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    input[type=text]:focus { border-color: #f59e0b; }

    .btn {
      width: 100%; padding: 10px 14px;
      border-radius: 7px; border: 1.5px solid transparent;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; letter-spacing: 0.06em;
      transition: opacity 0.12s;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn:active:not(:disabled) { opacity: 0.8; }

    .btn-amber  { background: #f59e0b; color: #111; }
    .btn-outline { background: #fff; color: #555; border-color: #ddd; font-size: 12px; }

    .edit-q-btn {
      margin-left: 2px; flex-shrink: 0;
      background: none; border: none; cursor: pointer;
      color: #bbb; font-size: 12px; padding: 2px 4px; border-radius: 4px;
      transition: color 0.1s;
    }
    .edit-q-btn:hover { color: #f59e0b; }
    .media-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #34d399; flex-shrink: 0; margin-left: 2px; align-self: center;
      title: "Har medie";
    }
    .q-edit-input {
      flex: 1; min-width: 0; padding: 4px 7px;
      border: 1.5px solid #f59e0b; border-radius: 5px;
      font-size: 12px; font-family: inherit; outline: none;
    }
    .edit-save-btn {
      flex-shrink: 0; padding: 4px 8px;
      background: #f59e0b; color: #111; border: none;
      border-radius: 5px; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .edit-cancel-btn {
      flex-shrink: 0; padding: 4px 6px;
      background: none; color: #aaa; border: 1px solid #ddd;
      border-radius: 5px; font-size: 11px; cursor: pointer;
    }
    .btn-green  { background: #34d399; color: #0d1a0f; }
    .btn-danger { background: transparent; color: #f43f5e; border-color: #f43f5e; }

    .gap { height: 10px; }

    .q-list { display: flex; flex-direction: column; gap: 5px; }
    .q-item {
      background: #f6f6f6; border-radius: 7px;
      padding: 8px 10px; display: flex;
      align-items: flex-start; gap: 8px;
      border: 1px solid transparent;
    }
    .q-item.is-active { background: #ecfdf5; border-color: #6ee7b7; }
    .q-item.is-done   { opacity: 0.45; }

    .q-num {
      width: 20px; height: 20px; border-radius: 5px;
      background: #ddd; display: flex;
      align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex: 0 0 auto; color: #555;
    }
    .q-num.on   { background: #34d399; color: #0d1a0f; }
    .q-num.done { background: #bbb; color: #fff; }

    .q-text { flex: 1; font-size: 12px; line-height: 1.35; }

    .badge {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.1em; padding: 2px 6px;
      border-radius: 999px; flex: 0 0 auto;
    }
    .badge-dilemma   { background: #dcfce7; color: #166534; }
    .badge-scale     { background: #dbeafe; color: #1e40af; }
    .badge-wordcloud { background: #fef9c3; color: #854d0e; }

    .code-big {
      font-size: 36px; font-weight: 800;
      letter-spacing: 0.22em; color: #f59e0b;
      text-align: center; padding: 6px 0;
    }
    .join-url {
      font-size: 11px; color: #888; text-align: center;
      margin-top: 4px; word-break: break-all;
    }

    .screen-link {
      display: block; width: 100%;
      padding: 9px 14px; margin-top: 8px;
      border-radius: 7px; border: 1.5px solid #6366f1;
      background: transparent; color: #818cf8;
      font-family: inherit; font-size: 13px; font-weight: 600;
      letter-spacing: 0.06em; cursor: pointer; text-align: center;
      text-decoration: none; transition: background 0.12s;
    }
    .screen-link:hover { background: rgba(99,102,241,0.1); }

    .pulse-row {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #888; margin-bottom: 10px;
    }
    .pulse-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #34d399; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .q-header { font-size: 15px; font-weight: 600; line-height: 1.3; margin-bottom: 14px; }

    .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .bar-lbl { font-size: 11px; width: 72px; flex: 0 0 auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .bar-track { flex: 1; height: 8px; background: #eee; border-radius: 999px; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 999px; transition: width 0.4s ease; }
    .bar-pct   { font-size: 11px; font-weight: 700; width: 30px; text-align: right; flex: 0 0 auto; }

    .big-num { text-align: center; padding: 10px 0; }
    .big-num-val { font-size: 36px; font-weight: 800; line-height: 1; }
    .big-num-lbl { font-size: 10px; color: #888; letter-spacing: 0.12em; margin-top: 3px; }

    .total-line { text-align: right; font-size: 11px; color: #aaa; margin-top: 10px; letter-spacing: 0.06em; }

    .hint {
      font-size: 11px; color: #999; line-height: 1.5;
      background: #f9f9f9; border-radius: 7px;
      padding: 10px 12px; margin-top: 10px;
    }
    .hint code { font-size: 11px; background: #eee; padding: 1px 4px; border-radius: 3px; }

    .err {
      background: #fee2e2; border: 1px solid #fecaca;
      border-radius: 7px; padding: 8px 10px;
      font-size: 12px; color: #dc2626; margin-top: 8px;
    }
    .ok-msg {
      background: #dcfce7; border: 1px solid #86efac;
      border-radius: 7px; padding: 8px 10px;
      font-size: 12px; color: #166534; margin-top: 8px;
    }

    .spinner { text-align: center; color: #aaa; padding: 16px; font-size: 12px; letter-spacing: 0.1em; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="brand">
  <div class="brand-dot"></div>
  <span class="brand-name">POLLINATOR</span>
</div>

<!-- ── IDLE ──────────────────────────────────────────────── -->
<div id="s-idle">
  <div class="section">
    <label class="lbl">Workshop-titel</label>
    <input type="text" id="title" placeholder="Min præsentation…" />
  </div>
  <div class="section">
    <label class="lbl">Spørgsmål fra præsentationen</label>
    <div id="idle-qs"><div class="spinner">Henter slides…</div></div>
    <div class="hint">
      Skriv i speaker notes på de slides der er spørgsmål:<br><br>
      Linje 1: <code>dilemma</code> / <code>skala</code> / <code>ordsky</code><br>
      Linje 2: optioner (kommasepareret)
    </div>
    <div class="gap"></div>
    <button class="btn btn-amber" id="create-btn" onclick="createSession()">Opret session →</button>
    <div id="idle-err"></div>
  </div>
</div>

<!-- ── LOBBY ─────────────────────────────────────────────── -->
<div id="s-lobby" class="hidden">
  <div class="section">
    <label class="lbl">Sessionskode</label>
    <div class="code-big" id="lobby-code"></div>
    <div class="join-url" id="lobby-url"></div>
    <div class="gap"></div>
    <a id="screen-link" href="#" target="_blank" class="screen-link">Åbn storskærm ↗</a>
    <div class="gap"></div>
    <div class="pulse-row"><div class="pulse-dot"></div><span>Venter på deltagere…</span></div>
    <button class="btn btn-green" onclick="startSession()">Start workshop →</button>
  </div>
  <div class="section">
    <label class="lbl">Spørgsmål</label>
    <div id="lobby-qs" class="q-list"></div>
    <div class="gap"></div>
    <button class="btn btn-outline" id="sync-btn-lobby" onclick="syncQuestions('lobby')">↺ Synkroniser slides</button>
    <div id="sync-msg-lobby"></div>
  </div>
</div>

<!-- ── ACTIVE ────────────────────────────────────────────── -->
<div id="s-active" class="hidden">
  <div class="section">
    <a id="screen-link-active" href="#" target="_blank" class="screen-link" style="margin-bottom:10px;">Storskærm ↗</a>
    <div class="pulse-row">
      <div class="pulse-dot"></div>
      <span id="a-progress"></span>
    </div>
    <div class="q-header" id="a-qtext"></div>
    <div id="a-bars"></div>
    <div class="total-line" id="a-total"></div>
    <div class="gap"></div>
    <div id="a-btns"></div>
    <div id="a-err"></div>
  </div>
  <div class="section">
    <label class="lbl">Spørgsmål</label>
    <div id="a-qlist" class="q-list"></div>
    <div class="gap"></div>
    <button class="btn btn-outline" id="sync-btn-active" onclick="syncQuestions('active')">↺ Synkroniser slides</button>
    <div id="sync-msg-active"></div>
  </div>
</div>

<!-- ── DONE ──────────────────────────────────────────────── -->
<div id="s-done" class="hidden">
  <div class="section">
    <div class="ok-msg" style="margin-top:0">Workshop afsluttet!</div>
    <div class="gap"></div>
    <button class="btn btn-green" onclick="writeResults()">Tilføj resultater til slides</button>
    <div id="done-msg"></div>
  </div>
</div>

<script>
  const BASE = "https://pollinator-nine.vercel.app";
  const COLORS = ["#f59e0b", "#34d399", "#60a5fa", "#f472b6", "#a78bfa"];

  let session = null;
  let localQs = [];
  let sortedQs = [];
  let curIdx = 0;
  let isOpen = false;
  let pollTimer = null;
  let collectedResults = [];

  // ── Init ──────────────────────────────────────────────

  document.addEventListener("DOMContentLoaded", () => {
    google.script.run
      .withSuccessHandler(qs => { localQs = qs; renderIdleQs(); })
      .withFailureHandler(() => {
        document.getElementById("idle-qs").innerHTML =
          '<div style="color:#aaa;font-size:12px;">Kunne ikke læse slides. Prøv at genindlæse.</div>';
      })
      .getSlideQuestions();
  });

  function renderIdleQs() {
    const el = document.getElementById("idle-qs");
    if (!localQs.length) {
      el.innerHTML = '<div style="color:#aaa;font-size:12px;">Ingen spørgsmål fundet endnu.<br>Tilføj type i speaker notes på dine slides.</div>';
      return;
    }
    el.innerHTML = '<div class="q-list">' +
      localQs.map((q, i) => {
        const names = { dilemma: "DILEMMA", scale: "SKALA", wordcloud: "ORDSKY" };
        const imgDot = q.slideImage ? '<div class="media-dot" title="Billede fra slide"></div>' : '';
        return `<div class="q-item" id="lqrow-${i}">
          <div class="q-num">${i + 1}</div>
          <div class="q-text">${q.prompt}</div>
          ${imgDot}
          <span class="badge badge-${q.type}">${names[q.type] || q.type.toUpperCase()}</span>
          <button class="edit-q-btn" onclick="startEditLocalQ(${i})" title="Ret overskrift">✏</button>
        </div>`;
      }).join("") + '</div>';
  }

  async function uploadMediaForQuestion(qId) {
    const inp = document.createElement("input");
    inp.type = "file";
    inp.accept = "image/*,video/*";
    inp.onchange = async () => {
      const file = inp.files[0];
      if (!file) return;
      const btn = document.getElementById("mediabtn-" + qId);
      if (btn) btn.textContent = "⏳";
      try {
        // Step 1: get a signed client token from our server
        const tokenRes = await fetch(BASE + "/api/upload", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            type: "blob.generate-client-token",
            payload: {
              pathname: file.name,
              callbackUrl: BASE + "/api/upload",
              multipart: false,
              clientPayload: null,
            },
          }),
        });
        const { clientToken } = await tokenRes.json();
        if (!clientToken) throw new Error("Ingen client token");

        // Step 2: PUT directly to Vercel Blob API — ingen 4.5 MB serverless-grænse
        const params = new URLSearchParams({ pathname: file.name });
        const uploadRes = await fetch(
          "https://vercel.com/api/blob/?" + params.toString(),
          {
            method: "PUT",
            headers: {
              "Authorization": "Bearer " + clientToken,
              "x-api-version": "12",
              "x-vercel-blob-access": "public",
              "x-content-type": file.type,
            },
            body: file,
          }
        );
        const blobJson = await uploadRes.json();
        const url = blobJson.url;
        if (!url) throw new Error("Ingen URL fra Vercel Blob");

        // Step 3: gem på spørgsmålet
        const q = sortedQs.find(q => q.id === qId);
        await api("PATCH", "/api/questions/" + qId, {
          prompt: q.prompt, options: q.options, type: q.type,
          ...(q.type === "scale" ? { scale_max: q.scale_max ?? 10 } : {}),
          media_url: url,
          media_type: file.type.startsWith("video/") ? "video" : "image",
        });
        q.media_url  = url;
        q.media_type = file.type.startsWith("video/") ? "video" : "image";
        renderQList();
      } catch(e) {
        alert("Upload fejl: " + e.message);
        if (btn) btn.textContent = "📎";
      }
    };
    inp.click();
  }

  function startEditLocalQ(i) {
    const q = localQs[i];
    const row = document.getElementById(`lqrow-${i}`);
    row.innerHTML = `
      <input id="lqinput-${i}" class="q-edit-input" value="${q.prompt.replace(/"/g, '&quot;')}" />
      <button class="edit-save-btn" onclick="saveEditLocalQ(${i})">Gem</button>
      <button class="edit-cancel-btn" onclick="renderIdleQs()">✕</button>`;
    const inp = document.getElementById(`lqinput-${i}`);
    inp.focus(); inp.select();
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") saveEditLocalQ(i);
      if (e.key === "Escape") renderIdleQs();
    });
  }

  function saveEditLocalQ(i) {
    const inp = document.getElementById(`lqinput-${i}`);
    const val = inp ? inp.value.trim() : "";
    if (val) localQs[i].prompt = val;
    renderIdleQs();
  }

  // ── Create session ────────────────────────────────────

  async function createSession() {
    const title = document.getElementById("title").value.trim();
    if (!title) { showErr("idle-err", "Skriv en titel til workshoppen."); return; }
    if (!localQs.length) { showErr("idle-err", "Ingen spørgsmål fundet i præsentationen."); return; }

    clearErr("idle-err");
    disableBtn("create-btn", "Opretter…");

    try {
      const s = await api("POST", "/api/sessions", { title });

      for (const q of localQs) {
        let mediaUrl = null, mediaType = null;
        if (q.slideImage) {
          try {
            const up = JSON.parse(await gsRun("uploadMediaFile", q.slideImage.b64, q.slideImage.mime, q.slideImage.name));
            if (up && up.url) { mediaUrl = up.url; mediaType = up.type; }
          } catch(e) {}
        }
        await api("POST", `/api/sessions/${s.code}/questions`, {
          prompt: q.prompt, options: q.options, type: q.type,
          ...(q.type === "scale" && q.scaleMax ? { scale_max: q.scaleMax } : {}),
          ...(mediaUrl ? { media_url: mediaUrl, media_type: mediaType } : {}),
        });
      }

      session = await api("GET", `/api/sessions/${s.code}`);
      sortedQs = [...session.questions].sort((a, b) => a.position - b.position);

      // Indsæt join-slide i præsentationen (fejl her stopper ikke flowet)
      try { await gsRun("insertJoinSlide", session.code, title); } catch(e) {}

      goLobby();
    } catch (e) {
      showErr("idle-err", e.message);
      enableBtn("create-btn", "Opret session →");
    }
  }

  // ── Sync slides → session ─────────────────────────────

  async function syncQuestions(ctx) {
    const btn = document.getElementById(`sync-btn-${ctx}`);
    const msg = document.getElementById(`sync-msg-${ctx}`);
    btn.disabled = true;
    btn.textContent = "Henter…";
    msg.innerHTML = "";
    try {
      const slideQs = await gsRun("getSlideQuestions");
      const current = await api("GET", `/api/sessions/${session.code}`);
      let existing = current.questions || [];

      // Tilføj nye (matcher på prompt + type)
      let added = 0;
      for (const q of slideQs) {
        const dup = existing.some(e => e.prompt === q.prompt && e.type === q.type);
        if (dup) continue;
        const newQ = await api("POST", `/api/sessions/${session.code}/questions`, {
          prompt: q.prompt, options: q.options, type: q.type,
          ...(q.type === "scale" && q.scaleMax ? { scale_max: q.scaleMax } : {}),
        });
        existing.push(newQ);
        added++;
      }

      // Fjern spørgsmål der ikke længere er i slides
      let removed = 0;
      for (const e of existing) {
        const stillInSlides = slideQs.some(q => q.prompt === e.prompt && q.type === e.type);
        if (stillInSlides) continue;
        await api("DELETE", `/api/questions/${e.id}`);
        removed++;
      }

      session = await api("GET", `/api/sessions/${session.code}`);
      sortedQs = [...session.questions].sort((a, b) => a.position - b.position);
      renderQList();

      const parts = [];
      if (added)   parts.push(`${added} tilføjet`);
      if (removed) parts.push(`${removed} fjernet`);
      msg.innerHTML = parts.length
        ? `<div class="ok-msg">${parts.join(" · ")}</div>`
        : `<div class="hint">Ingen ændringer</div>`;
    } catch (e) {
      msg.innerHTML = `<div class="err">${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "↺ Synkroniser slides";
    }
  }

  // ── Lobby ─────────────────────────────────────────────

  function goLobby() {
    show("s-lobby");
    const screenUrl = `${BASE}/screen/${session.code}`;
    document.getElementById("lobby-code").textContent = session.code;
    document.getElementById("lobby-url").textContent = `${BASE}/s/${session.code}`;
    document.getElementById("screen-link").href = screenUrl;
    document.getElementById("screen-link-active").href = screenUrl;
    renderQList();
  }

  // ── Active ────────────────────────────────────────────

  async function startSession() {
    try {
      curIdx = 0;
      isOpen = true;
      await api("PATCH", `/api/sessions/${session.code}`, {
        current_question_id: sortedQs[0].id,
        state: "active",
      });
      show("s-active");
      renderActiveQ();
      startPoll();
    } catch (e) {
      alert("Fejl: " + e.message);
    }
  }

  async function closeAnswers() {
    try {
      await api("PATCH", `/api/questions/${sortedQs[curIdx].id}`, { is_open: false });
      isOpen = false;
      stopPoll();
      await storeResult(sortedQs[curIdx]);
      renderActiveBtns();
    } catch (e) {
      showErr("a-err", e.message);
    }
  }

  async function goNext() {
    clearErr("a-err");
    curIdx++;
    if (curIdx >= sortedQs.length) {
      await endSession();
      return;
    }
    try {
      isOpen = true;
      await api("PATCH", `/api/sessions/${session.code}`, {
        current_question_id: sortedQs[curIdx].id,
      });
      renderActiveQ();
      startPoll();
    } catch (e) {
      showErr("a-err", e.message);
    }
  }

  async function endSession() {
    stopPoll();
    try {
      await storeResult(sortedQs[curIdx]);
      await api("PATCH", `/api/sessions/${session.code}`, { state: "closed" });
    } catch {}
    show("s-done");
  }

  // ── Rendering ─────────────────────────────────────────

  function renderActiveQ() {
    const q = sortedQs[curIdx];
    document.getElementById("a-progress").textContent =
      `SPØRGSMÅL ${curIdx + 1} / ${sortedQs.length}`;
    document.getElementById("a-qtext").textContent = q.prompt;
    document.getElementById("a-bars").innerHTML = "";
    document.getElementById("a-total").textContent = "";
    clearErr("a-err");
    renderActiveBtns();
    renderActiveQList();
  }

  function renderActiveBtns() {
    const isLast = curIdx >= sortedQs.length - 1;
    document.getElementById("a-btns").innerHTML = isOpen
      ? `<button class="btn btn-danger" onclick="closeAnswers()">Luk svar ■</button>`
      : isLast
        ? `<button class="btn btn-green" onclick="endSession()">Afslut workshop ✓</button>`
        : `<button class="btn btn-green" onclick="goNext()">Næste spørgsmål →</button>`;
  }

  function renderActiveQList() {
    document.getElementById("a-qlist").innerHTML =
      sortedQs.map((q, i) => {
        const cls    = i === curIdx ? "is-active" : i < curIdx ? "is-done" : "";
        const numCls = i === curIdx ? "on" : i < curIdx ? "done" : "";
        const numTxt = i < curIdx ? "✓" : String(i + 1);
        return qItemEditable(q, i, cls, numCls, numTxt);
      }).join("");
  }

  function renderLive(data) {
    document.getElementById("a-total").textContent = data.total + " svar";

    if (data.type === "dilemma" && data.tally?.length) {
      document.getElementById("a-bars").innerHTML = data.tally.map((item, i) => {
        const pct = data.total > 0 ? Math.round((item.votes / data.total) * 100) : 0;
        return `<div class="bar-row">
          <div class="bar-lbl" title="${item.label}">${item.label}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${COLORS[i%COLORS.length]}"></div></div>
          <div class="bar-pct">${pct}%</div>
        </div>`;
      }).join("");
    } else if (data.type === "scale" && data.average != null) {
      document.getElementById("a-bars").innerHTML = `
        <div class="big-num">
          <div class="big-num-val" style="color:#60a5fa">${data.average.toFixed(1)}</div>
          <div class="big-num-lbl">GENNEMSNIT UD AF 10</div>
        </div>`;
    } else if (data.type === "wordcloud" && data.words) {
      const top = data.words.slice(0, 6);
      document.getElementById("a-bars").innerHTML = top.length
        ? `<div style="font-size:13px;line-height:2;color:#555;">${top.map(w => `<b>${w.word}</b> (${w.count})`).join(" · ")}</div>`
        : `<div style="color:#aaa;font-size:12px;padding:8px 0;">Venter på ord…</div>`;
    }
  }

  // ── Polling ───────────────────────────────────────────

  function startPoll() {
    stopPoll();
    pollNow();
    pollTimer = setInterval(pollNow, 2000);
  }

  function stopPoll() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  }

  async function pollNow() {
    const q = sortedQs[curIdx];
    if (!q) return;
    try {
      let data;
      if (q.type === "wordcloud") {
        const words = await api("GET", `/api/questions/${q.id}/words`);
        data = { type: "wordcloud", words, total: words.reduce((s, w) => s + w.count, 0) };
      } else {
        data = await api("GET", `/api/questions/${q.id}/results`);
      }
      renderLive(data);
    } catch {}
  }

  // ── Results export ────────────────────────────────────

  async function storeResult(q) {
    try {
      let result;
      if (q.type === "wordcloud") {
        const words = await api("GET", `/api/questions/${q.id}/words`);
        result = { question_id: q.id, prompt: q.prompt, type: "wordcloud",
          words, total: words.reduce((s, w) => s + w.count, 0) };
      } else {
        result = await api("GET", `/api/questions/${q.id}/results`);
      }
      collectedResults = collectedResults.filter(r => r.question_id !== q.id);
      collectedResults.push(result);
    } catch {}
  }

  async function writeResults() {
    for (const q of sortedQs) {
      if (!collectedResults.find(r => r.question_id === q.id)) {
        await storeResult(q);
      }
    }
    const el = document.getElementById("done-msg");
    el.innerHTML = '<div style="color:#888;font-size:12px;margin-top:8px;">Tilføjer slides…</div>';
    google.script.run
      .withSuccessHandler(() => {
        el.innerHTML = '<div class="ok-msg">Resultater tilføjet som nye slides ✓</div>';
      })
      .withFailureHandler(err => {
        el.innerHTML = `<div class="err">${err.message}</div>`;
      })
      .writeResultsToSlides(JSON.stringify(collectedResults));
  }

  // ── Helpers ───────────────────────────────────────────

  // Wrapper der promisificerer google.script.run
  function gsRun(fn, ...args) {
    return new Promise((resolve, reject) =>
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(err => reject(new Error(err.message || String(err))))
        [fn](...args)
    );
  }

  // API-kald via server-side UrlFetchApp (ingen CORS-problemer)
  async function api(method, path, body) {
    const fn = method === "GET"    ? "apiGet"
             : method === "POST"   ? "apiPost"
             : method === "DELETE" ? "apiDelete"
             : "apiPatch";
    const resultJson = await gsRun(fn, path, body ? JSON.stringify(body) : null);
    if (!resultJson || resultJson === "null") return null;
    const data = JSON.parse(resultJson);
    if (data && data.error) throw new Error(data.error);
    return data;
  }

  function qItem(num, prompt, type, itemCls, numCls) {
    const names = { dilemma: "DILEMMA", scale: "SKALA", wordcloud: "ORDSKY" };
    return `<div class="q-item ${itemCls}">
      <div class="q-num ${numCls}">${num}</div>
      <div class="q-text">${prompt}</div>
      <span class="badge badge-${type}">${names[type] || type.toUpperCase()}</span>
    </div>`;
  }

  // Spørgsmålsrække med inline-redigering (lobby + active)
  function qItemEditable(q, i, itemCls, numCls, numTxt) {
    const names = { dilemma: "DILEMMA", scale: "SKALA", wordcloud: "ORDSKY" };
    const num = numTxt ?? String(i + 1);
    const hasMedia = !!(q.media_url);
    const mediaIcon = hasMedia ? '🖼' : '📎';
    const mediaTitle = hasMedia ? 'Skift medie' : 'Tilføj billede/video';
    return `<div class="q-item ${itemCls || ''}" id="qrow-${q.id}">
      <div class="q-num ${numCls || ''}">${num}</div>
      <div class="q-text">${q.prompt}</div>
      <span class="badge badge-${q.type}">${names[q.type] || q.type.toUpperCase()}</span>
      <button class="edit-q-btn" id="mediabtn-${q.id}" onclick="uploadMediaForQuestion('${q.id}')" title="${mediaTitle}">${mediaIcon}</button>
      <button class="edit-q-btn" onclick="startEditQ('${q.id}')" title="Ret overskrift">✏</button>
    </div>`;
  }

  function startEditQ(qId) {
    const q = sortedQs.find(q => q.id === qId);
    if (!q) return;
    const row = document.getElementById(`qrow-${qId}`);
    row.innerHTML = `
      <input id="qinput-${qId}" class="q-edit-input" value="${q.prompt.replace(/"/g, '&quot;')}" />
      <button class="edit-save-btn" onclick="saveEditQ('${qId}')">Gem</button>
      <button class="edit-cancel-btn" onclick="cancelEditQ('${qId}')">✕</button>`;
    const inp = document.getElementById(`qinput-${qId}`);
    inp.focus();
    inp.select();
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") saveEditQ(qId);
      if (e.key === "Escape") cancelEditQ(qId);
    });
  }

  async function saveEditQ(qId) {
    const q = sortedQs.find(q => q.id === qId);
    const inp = document.getElementById(`qinput-${qId}`);
    if (!q || !inp) return;
    const newPrompt = inp.value.trim();
    if (!newPrompt) return;
    inp.disabled = true;
    try {
      await api("PATCH", `/api/questions/${qId}`, {
        prompt: newPrompt,
        options: q.options,
        type: q.type,
        ...(q.type === "scale" ? { scale_max: q.scale_max ?? 10 } : {}),
      });
      q.prompt = newPrompt;
    } catch(e) { alert("Fejl: " + e.message); }
    renderQList();
  }

  function cancelEditQ(qId) {
    renderQList();
  }

  function renderQList() {
    const lobby = document.getElementById("lobby-qs");
    if (lobby) lobby.innerHTML = sortedQs.map((q, i) => qItemEditable(q, i)).join("");
    renderActiveQList();
  }

  function show(id) {
    ["s-idle","s-lobby","s-active","s-done"].forEach(s =>
      document.getElementById(s).classList.toggle("hidden", s !== id));
  }

  function showErr(id, msg) { document.getElementById(id).innerHTML = `<div class="err">${msg}</div>`; }
  function clearErr(id) { document.getElementById(id).innerHTML = ""; }
  function disableBtn(id, txt) { const b = document.getElementById(id); b.textContent = txt; b.disabled = true; }
  function enableBtn(id, txt) { const b = document.getElementById(id); b.textContent = txt; b.disabled = false; }
</script>
</body>
</html>
